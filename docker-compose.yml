version: '3.8'

services:
  backend:
    build: ./backend/ai-service
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:///./test.db
      - SECRET_KEY=DEV_SECRET_DO_NOT_USE_IN_PROD
    volumes:
      - ./backend/ai-service:/app

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend
